name: job-agent

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  find-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the one thing the script needs
        run: pip install requests

      - name: Run the job agent
        run: python job_agent.py
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

      - name: Publish the dashboard
        run: |
          git config user.name "job-agent"
          git config user.email "actions@users.noreply.github.com"
          git add docs/index.html docs/jobs_found.csv
          git commit -m "Update job dashboard" || echo "Nothing to commit"
          git fetch origin main
          git rebase origin/main || git rebase --abort
          git push origin main
